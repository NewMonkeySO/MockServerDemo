  /services/{id}:
    get:
      tags:
      - services
      summary: (M16-IF-030)サービスの詳細情報を取得
      operationId: getServicesId
      description: "指定されたサービスIDに対応する、オンデマンドバスサービスの詳細情報を取得します。  \nこのAPIでは、一覧取得（`GET /services`）では省略されている以下の詳細項目を含む情報を取得できます：\n\n- `operation_settings`（運行設定）\n- `reservable_areas`（予約可能なエリア）\n- `area_transitions`（エリア間移動ルール）\n\nこれらの項目はデータ量が多く、一覧取得時には不要なケースが多いため、本APIで個別に取得できるように設計されています。\n"
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: サービスIDを指定します。<br/>- m\_service.service\_id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - type: object
                  required:
                  - id
                  - name
                  - access_scope
                  - operation_type
                  - allow_ridepooling
                  - start_datetime
                  - cities
                  - service_terms
                  - available_passenger_types
                  - supported_accessibility_features
                  - operating_hours
                  - special_operating_hours
                  - announcements
                  properties:
                    id:
                      type: string
                      description: サービスの一意な識別子です。
                    name:
                      type: string
                      description: サービスの名称です。
                    description:
                      type: string
                      description: サービスの説明です。
                    brand_image_url:
                      type: string
                      description: サービスのブランドイメージ画像のURLです。
                    access_scope:
                      type: string
                      enum:
                      - public
                      - resident_only
                      - registered_user_only
                      - private
                      - other
                      description: "サービスの公開範囲を示します。\n- **`public`**  \n限定なし、一般公開されていて誰でも利用できるサービス。\n- **`resident_only`**  \nサービス提供エリアに在住の地域住民のみが利用可能なサービス。\n- **`registered_user_only`**  \n事前登録をしたユーザーのみが利用可能なサービス。\n- **`private`**  \n一般公開されていない、特定の内部ユーザーのみが利用可能なサービス。\n- **`other`**  \nその他。\n"
                    operation_type:
                      type: string
                      enum:
                      - on_demand
                      - slot_area_batch_confirmed
                      - fixed_time_fixed_route
                      description: "サービスの運行方式の種類を示します。\n- **`on_demand`**  \n利用者の予約に応じて即時配車されるオンデマンド方式。\n- **`slot_area_batch_confirmed`**  \n時間帯ごとに運行エリアを切り替える方式で、各時間帯の締切時刻を設け、締切後に暫定予約をまとめて確定し、効率的なルートを生成して運行します。\n- **`fixed_time_fixed_route`**  \n決まったルートと時刻で運行される固定路線方式。\n"
                    allow_ridepooling:
                      type: boolean
                      description: 相乗りが発生し得るか否かを示します。
                    start_datetime:
                      type: string
                      description: サービスの開始日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。
                      format: date-time
                    end_datetime:
                      type: string
                      description: サービスの終了日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T20:59:59+09:00）です。この項目が指定されていない場合、サービスは「無期限（終了日未定）」として扱われます。
                      format: date-time
                    service_group_id:
                      type: string
                      description: "サービスの上位グループの一意な識別子です。  \n指定がない場合は、サービスが単独で存在することを示します。\n"
                    cities:
                      type: array
                      description: サービスが提供される都道府県・市区町村のリストです。
                      minItems: 0
                      items:
                        type: object
                        required:
                        - prefecture_code
                        - prefecture_name
                        - municipalities
                        properties:
                          prefecture_code:
                            type: string
                            description: 都道府県コードです。
                          prefecture_name:
                            type: string
                            description: 都道府県名です。
                          municipalities:
                            type: array
                            description: 市区町村のリストです。
                            minItems: 0
                            items:
