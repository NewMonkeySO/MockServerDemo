  /passengers:
    post:
      tags:
      - passengers
      summary: (M16-IF-040)ユーザー情報を新規登録
      operationId: postPassengers
      description: "ユーザー情報を新規登録します。  \n氏名（`first_name` / `last_name`）またはフリガナ（`first_name_kana` / `last_name_kana`）のいずれか一方は必須です。  \n両方を同時に指定することも可能です。\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
              - type: object
                properties:
                  first_name:
                    type: string
                    description: ユーザーの氏名の名です。<br/>- m\_passenger.first\_name
                  last_name:
                    type: string
                    description: ユーザーの氏名の姓です。<br/>- m\_passenger.last\_name
                  first_name_kana:
                    type: string
                    description: ユーザーの氏名の名のフリガナです。<br/>- m\_passenger.first\_name\_kana
                  last_name_kana:
                    type: string
                    description: ユーザーの氏名の姓のフリガナです。<br/>- m\_passenger.last\_name\_kana
                  gender:
                    type: string
                    enum:
                    - male
                    - female
                    - other
                    - unspecified
                    description: "ユーザーの性別です。\n- **`male`**  \n男性\n- **`female`**  \n女性\n- **`other`**  \nその他\n- **`unspecified`**  \n指定なし<br/>- m\\_passenger.gender"
                  birthdate:
                    type: string
                    format: date
                    description: ユーザーの生年月日です。形式はRFC3339のfull-date形式文字列（例：2025-06-19）です。<br/>- m\_passenger.birthdate
                  phone_number:
                    type: string
                    description: ユーザーの電話番号です。国際電話番号形式で、先頭に国コード（例：+81）を含めます。<br/>- m\_passenger.phone\_number
                  email:
                    type: string
                    format: email
                    description: ユーザーのメールアドレスです。<br/>- m\_passenger.email
                  home_address:
                    type: object
                    description: "ユーザーの自宅住所を構成する位置情報オブジェクトです。  \n郵便番号・都道府県・市区町村・番地などの文字情報に加え、経度・緯度（WGS-84）による地理座標も含まれます。  \n自宅予約を行う場合は、`location` の指定が必要です。\n"
                    properties:
                      postal_code:
                        type: string
                        description: 郵便番号です。（ハイフンを含みません）<br/>- m\_passenger.home\_address\_postal\_code
                      state:
                        type: string
                        description: 都道府県名です。<br/>- m\_passenger.home\_address\_state
                      city:
                        type: string
                        description: 市区町村名です。<br/>- m\_passenger.home\_address\_city
                      street:
                        type: string
                        description: 丁目・番地などの住所の詳細部分です。<br/>- m\_passenger.home\_address\_street
                      location:
                        description: "自宅位置を示す、経度・緯度（WGS-84）による地理座標です。  \n`location` を指定する場合は `type`, `coordinates` の両方の指定が必須です。<br/>- m\\_passenger.home\\_address\\_location"
                        type: object
                        properties:
                          type:
                            type: string
                            enum:
                            - Point
                            description: GeoJSONにおけるジオメトリタイプ（常に `Point`）
                          coordinates:
                            type: array
                            description: "経度・緯度を含む配列です。  \n`[longitude, latitude]` の順で格納されます（GeoJSON仕様準拠）。\n"
                            minItems: 2
                            maxItems: 2
                            items:
                              type: number
                              format: double
              - type: object
                description: "ユーザー登録時の入力情報です。  \n氏名（`first_name` / `last_name`）またはフリガナ（`first_name_kana` / `last_name_kana`）のいずれか一方は必須です。  \n両方を同時に指定することも可能です。\n"
