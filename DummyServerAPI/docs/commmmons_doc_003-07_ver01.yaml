                    instance: string
  /operation-delays:
    get:
      tags:
      - operation
      summary: (M16-IF-190)運行遅延情報を取得
      operationId: getOperationDelays
      description: "運行遅延情報を取得します。  \nこの検索APIでは、クエリパラメータの指定に応じて複数の条件で車両を絞り込むことができます。  \n各条件は組み合わせて使用可能で、AND 条件として評価されます。  \n\n主な検索条件とその動作は以下のとおりです：  \n- `status`  \n  遅延の状態（`active`, `resolved`）で絞り込みます。  \n  複数指定可能（OR 条件）です。  \n  省略時は `active` が指定された状態と同様に扱われます。\n- `vehicle_ids`  \n  明示的な車両IDの指定（OR 条件、カンマ区切り）です。  \n  他の条件よりも優先され、指定されたIDに一致する車両の運行遅延情報のみを返します。  \n- `service_ids`  \n  指定されたサービスのいずれかで利用可能な車両の運行遅延情報を対象とします（OR 条件、カンマ区切り）。  \n- `started_at_from`  \n  遅延情報の開始日時のフィルター開始日時を指定します。  \n  `started_at_from`と`started_at_to`の両方を指定しなかった場合、現在時刻の24時間前から現在時刻までの遅延情報を取得します。  \n- `started_at_to`  \n  遅延情報の開始日時のフィルター終了日時を指定します。  \n  `started_at_to`を指定する場合は、`started_at_from`も指定する必要があります。  \n\nリクエスト例:  \n```\nGET /v1/operation-delays?vehicle_ids=1,2&service_ids=1,2&offset=30&limit=10\n```\n"
      parameters:
      - name: status
        in: query
        style: form
        explode: false
        schema:
          type: array
          items:
            type: string
            enum:
            - active
            - resolved
          default:
          - active
        description: "フィルター対象とする運行遅延のステータスを複数指定します。  \n- **`active`**  \n  現在進行中の遅延\n- **`resolved`**  \n  解決済みの遅延<br/>- t\\_operation\\_delay.status"
        example:
        - active
        - resolved
      - name: vehicle_ids
        in: query
        description: '取得対象の車両IDをカンマ区切りで指定します。

          指定されたいずれかの車両IDに該当する対象を取得します（OR条件）。<br/>- t\_operation\_delay.vehicle\_id'
        schema:
          type: array
          items:
            type: string
          example:
          - '1'
          - '2'
          - '3'
        style: form
        explode: false
      - name: service_ids
        in: query
        schema:
          type: array
          items:
            type: string
          example:
          - '1'
          - '2'
          - '3'
          description: "取得対象のサービスIDをカンマ区切りで指定します。  \n指定されたいずれかのサービスIDに該当する対象を取得します（OR条件）。\n"
        style: form
        explode: false
        description: '- t\_operation\_delay.service\_id'
      - name: started_at_from
        in: query
        description: 取得対象とする遅延情報の開始日時（以降）です。RFC3339のdate-time形式文字列（例：2025-07-01T00:00:00+09:00）で指定してください。<br/>- t\_operation\_delay.started\_at
        schema:
          type: string
          format: date-time
        example: '2025-06-01T00:00:00+09:00'
      - name: started_at_to
        in: query
        description: 取得対象とする遅延情報の開始日時（以前）です。RFC3339のdate-time形式文字列（例：2025-07-03T23:59:59+09:00）で指定してください。<br/>- t\_operation\_delay.started\_at
        schema:
          type: string
          format: date-time
        example: '2025-06-30T23:59:59+09:00'
      - name: offset
        in: query
        description: 取得する結果の開始位置を指定します。<br/>- N/A (Pagination Logic)
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
        example: 30
      - name: limit
        in: query
        description: 取得する結果の最大件数を指定します。<br/>- N/A (Pagination Logic)
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        example: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - type: object
                  required:
                  - operation_delays
                  - total
                  - offset
                  - limit
                  properties:
                    operation_delays:
                      description: 運行遅延情報のリストです。
                      type: array
                      minItems: 0
                      items:
                        type: object
                        required:
                        - id
                        - status
                        - vehicle_id
                        - delay_reason
                        - effective_end
                        properties:
                          id:
                            type: string
                            description: 遅延情報の一意な識別子です。
                            example: '1'
                          status:
                            type: string
                            enum:
                            - active
                            - resolved
                            description: "遅延の状態を示します。  \n- **`active`**\n  遅延している\n- **`resolved`**\n  遅延解消済み\n"
                            example: active
                          vehicle_id:
                            type: string
                            description: 遅延している車両のIDです。
                          service_id:
                            type: string
                            description: 車両が属するサービスのIDです。
                          delay_minutes:
                            type: integer
                            format: int32
                            description: 車両の運行遅延時間（分単位）です。
                            minimum: 0
                            example: 5
                          delay_reason:
                            type: string
                            enum:
                            - traffic
                            - operational
                            - accident
                            - weather
                            - vehicle_issue
                            - passenger_issue
                            - other
                            description: "遅延の理由を表すコードです。  \n- **`traffic`**  \n  交通渋滞\n- **`accident`**  \n  事故\n- **`weather`**  \n  天候による影響\n- **`vehicle_issue`**  \n  車両の問題\n- **`operational`**  \n  運行上の問題\n- **`passenger_issue`**  \n  乗客に関する問題\n- **`other`**  \n  その他\n"
                          delay_reason_detail:
                            type: string
                            description: 遅延の理由に関する詳細な説明です。
                          started_at:
                            type: string
                            format: date-time
                            description: 遅延が開始した日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。
                          closed_at:
                            type: string
                            format: date-time
                            description: "遅延が終了した日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。  \n`status` が `resolved` の場合に限り当該項目が設定されることがあります。\n"
                          closed_reason:
                            type: string
                            enum:
                            - vehicle_moved
                            - resolved
                            - schedule_changed
                            - cancelled
                            description: "遅延が終了した理由を表すコードです。  \n`status` が `resolved` の場合に限り当該項目が設定されることがあります。\n- **`vehicle_moved`**  \n  車両が動いた\n- **`resolved`**  \n  遅延が解消された\n- **`schedule_changed`**  \n  スケジュール変更された\n- **`cancelled`**  \n  運行をキャンセルした\n"
                          closed_reason_detail:
                            type: string
                            description: "遅延終了の理由に関する詳細な説明です。  \n`status` が `resolved` の場合に限り当該項目が設定されることがあります。\n"
                          effective_end:
                            type: string
                            format: date-time
                            description: "遅延情報の有効期限を示す日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。  \nここで指定された日時まで、有効な遅延情報として扱われます。\n"
                          created_at:
                            type: string
                            description: 作成日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。
                            format: date-time
                          updated_at:
                            type: string
                            description: 最終更新日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。
                            format: date-time
                - type: object
                  properties:
                    total:
                      type: integer
                      description: 取得可能な総件数を示します。
                    offset:
                      type: integer
                      description: 取得する結果の開始位置を示します。デフォルトは0です。
                    limit:
                      type: integer
                      description: 取得する結果の最大件数を示します。デフォルトは20件です。
              examples:
                TestCase001:
                  value:
                    operation_delays:
                    - id: de012345678
                      status: resolved
                      vehicle_id: vh012345678
                      service_id: sv012345678
                      delay_minutes: 5
                      delay_reason: traffic
                      delay_reason_detail: 途中の経路上で渋滞が発生しているため、遅れが発生しています。
                      started_at: '2025-06-19T07:00:00+09:00'
                      closed_at: '2025-06-19T07:00:00+09:00'
                      closed_reason: resolved
                      closed_reason_detail: 渋滞を抜けたため、遅延が解消されました。
                      effective_end: '2025-06-19T23:59:59+09:00'
                      created_at: '2025-06-19T07:00:00+09:00'
                      updated_at: '2025-06-19T07:12:23+09:00'
                    - id: de012345679
                      status: active
                      vehicle_id: vh012345679
                      service_id: sv012345679
                      delay_minutes: 10
                      delay_reason: vehicle_issue
                      delay_reason_detail: 車両の故障により、運行が遅れています。
                      started_at: '2025-06-19T07:00:00+09:00'
                      effective_end: '2025-06-19T23:59:59+09:00'
                      created_at: '2025-06-19T07:00:00+09:00'
                      updated_at: '2025-06-19T07:12:23+09:00'
                    total: 2
                    offset: 0
                    limit: 10
