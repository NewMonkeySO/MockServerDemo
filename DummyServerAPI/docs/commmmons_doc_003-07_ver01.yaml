  /passengers/{id}/reservations:
    get:
      tags:
      - passengers
      summary: (M16-IF-140)ユーザーの予約一覧を取得
      operationId: getPassengersIdReservations
      description: "パスパラメータで指定したユーザーが登録した予約情報を、クエリパラメータの指定に応じて複数の条件で予約情報を絞り込んで、複数件取得します。  \n一覧表示や履歴画面など、複数の予約情報を取得する用途で利用されます。  \n各予約オブジェクトのレスポンス構造は `GET /reservations/{id}` と共通です。  \n各条件は組み合わせて使用可能で、AND 条件として評価されます。  \n\n主な検索条件とその動作は以下のとおりです：\n- `pickup_date_from`  \n  乗車予定日のフィルター開始日を指定します（この日を含みます）。  \n  指定がない場合は制限されません。  \n- `pickup_date_to`  \n  乗車予定日のフィルター終了日を指定します（この日を含みます）。  \n  指定がない場合は制限されません。\n- `reservation_ids`  \n  明示的に指定された予約IDのリストに含まれる予約を対象とします（完全一致、カンマ区切り）。  \n- `status`  \n  指定された予約ステータス（`tentative`, `confirmed`, `no_show`, `in_transit`, `completed`, `cancelled`）に一致する予約を対象とします。  \n  複数指定可能（OR 条件）です。  \n\nリクエスト例:\n```\nGET /passengers/{id}/reservations?reservation_ids=1,2,3&status=tentative,confirmed&offset=30&limit=10\n```\n"
      parameters:
      - in: path
        name: id
        required: true
        description: 予約を登録したユーザーIDを指定します。<br/>- t\_reservation.passenger\_id
        schema:
          type: string
          example: ps012345678
      - name: pickup_date_from
        in: query
        description: "乗車予定日のフィルター開始日です（この日を含みます）。形式はRFC3339のdate形式文字列（例：2025-06-19）です。  \n指定がない場合は制限されません。<br/>- t\\_reservation.pickup\\_datetime"
        schema:
          type: string
          format: date
          example: '2025-07-01'
      - name: pickup_date_to
        in: query
        description: "乗車予定日のフィルター終了日です（この日を含みます）。形式はRFC3339のdate形式文字列（例：2025-06-19）です。  \n指定がない場合は制限されません。<br/>- t\\_reservation.pickup\\_datetime"
        schema:
          type: string
          format: date
          example: '2025-07-05'
      - in: query
        name: reservation_ids
        description: 取得対象の予約IDをカンマ区切りで指定します。<br/>- t\_reservation.reservation\_id
        schema:
          type: array
          items:
            type: string
          example:
          - '1'
          - '2'
          - '3'
        style: form
        explode: false
      - in: query
        name: status
        description: "フィルター対象とする予約のステータスを複数指定します。  \n指定がない場合はすべてのステータスを含む結果が返されます。  \n- **`tentative`**  \n  仮予約。乗車便が未確定で、締切前の状態です。確定処理が行われるまではこの状態となります。\n- **`confirmed`**  \n  確定予約。 確定予約。乗車便が成立した状態です。\n- **`in_transit`**  \n  乗車中。車両が運行中で、乗客が乗車している状態です。\n- **`completed`**  \n  降車済み。乗車が完了し、正常に終了した予約です。\n- **`no_show`**  \n  未乗車。予約は確定していたものの、乗客が現れず乗車しなかった状態です。\n- **`cancelled`**  \n  キャンセル済み。利用者またはシステムにより予約が取り消された状態です。（仮予約・確定予約いずれからも遷移します）<br/>- t\\_reservation.status"
        schema:
          type: array
          items:
            type: string
            description: "予約のステータスです。  \n- **`tentative`**  \n  仮予約。乗車便が未確定で、締切前の状態です。確定処理が行われるまではこの状態となります。\n- **`confirmed`**  \n  確定予約。 確定予約。乗車便が成立した状態です。\n- **`in_transit`**  \n  乗車中。車両が運行中で、乗客が乗車している状態です。\n- **`completed`**  \n  降車済み。乗車が完了し、正常に終了した予約です。\n- **`no_show`**  \n  未乗車。予約は確定していたものの、乗客が現れず乗車しなかった状態です。\n- **`cancelled`**  \n  キャンセル済み。利用者またはシステムにより予約が取り消された状態です。（仮予約・確定予約いずれからも遷移します）\n"
            enum:
            - tentative
            - confirmed
            - no_show
            - in_transit
            - completed
            - cancelled
        style: form
        explode: false
        example:
        - tentative
        - confirmed
      - name: offset
        in: query
        description: 取得する結果の開始位置を指定します。<br/>- N/A (Pagination Logic)
        required: false
        schema:
