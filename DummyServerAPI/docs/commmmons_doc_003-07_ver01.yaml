  /vehicle-locations:
    get:
      tags:
      - vehicles
      summary: (M16-IF-180)車両の位置情報を取得
      operationId: getVehicleLocations
      description: "車両の現在位置情報を取得します。  \nこの検索APIでは、クエリパラメータの指定に応じて複数の条件で対象の車両を絞り込むことができます。  \n各条件は組み合わせて使用可能で、AND 条件として評価されます。  \n\n主な検索条件とその動作は以下のとおりです：  \n- `vehicle_ids`  \n  明示的な車両IDの指定（OR 条件、カンマ区切り）です。  \n  他の条件よりも優先され、指定されたIDに一致する車両情報のみを返します。  \n- `service_ids`  \n  指定されたサービスのいずれかで利用可能な車両を対象とします（OR 条件、カンマ区切り）。  \n\nリクエスト例:  \n```\nGET /vehicle-locations?vehicle_ids=1,2&service_ids=1,2&offset=30&limit=10\n```\n"
      parameters:
      - name: vehicle_ids
        in: query
        description: '取得対象の車両IDをカンマ区切りで指定します。

