  /passengers/{id}/services:
    get:
      tags:
      - passengers
      summary: (M16-IF-080)ユーザーが利用可能なサービスの概要情報一覧を取得
      operationId: getPassengersIdServices
      description: "パスパラメータで指定したユーザーが利用可能なサービスを、クエリパラメータの指定に応じて複数の条件でサービスを絞り込んで、複数件取得します。  \n対象のユーザーが利用できる「住民限定」や「登録ユーザー限定」などのサービス情報を取得する用途で利用されます。  \n各サービスオブジェクトのレスポンス構造は GET /services と共通です。  \n\nこの検索APIでは、クエリパラメータの指定に応じて複数の条件でサービスを絞り込むことができます。  \n各条件は組み合わせて使用可能で、AND 条件として評価されます。  \n\n主な検索条件とその動作は以下のとおりです：\n- `service_ids`  \n  明示的なサービスIDの指定（完全一致）です。  \n  他の条件よりも優先され、指定されたIDに一致するサービスのみを返します。  \n- `name`  \n  サービス名称に対する部分一致検索です。  \n- `prefecture_code`  \n  都道府県コードによる絞り込みが可能です。  \n- `municipality_code`  \n  市区町村コードによる絞り込みが可能です。  \n- `status`  \n  利用開始・終了日時に基づいたステータス（`upcoming`, `active`, `ended`）で絞り込みます。  \n  複数指定可能（OR 条件）です。  \n  省略時は `upcoming`, `active` の両方が指定された状態と同様に扱われます。  \n\n※ 注意：この一覧APIのレスポンスには、以下の詳細情報は含まれません。  \n- `operation_settings`（運行設定）\n- `reservable_areas`（予約可能なエリア）\n- `area_transitions`（エリア間移動ルール）\n\n上記の項目はデータ量が大きく、一覧取得時には不要なケースが多いため、個別取得API（`GET /services/{id}`）でのみ提供されます。\n\nリクエスト例:\n```\nGET /passengers/{id}/services?service_ids=1,2,3&name=港区&prefecture_code=13&municipality_code=13103&offset=30&limit=10\n\
        ```\n"
      parameters:
      - in: path
        name: id
        required: true
        description: ユーザーIDを指定します。<br/>- m\_passenger.passenger\_id
        schema:
          type: string
          example: ps012345678
      - name: service_ids
        in: query
        schema:
          type: array
          items:
            type: string
          example:
          - '1'
          - '2'
          - '3'
          description: "取得対象のサービスIDをカンマ区切りで指定します。  \n指定されたいずれかのサービスIDに該当する対象を取得します（OR条件）。\n"
        style: form
        explode: false
        description: '- m\_service.service\_id'
      - in: query
        name: name
        description: 取得対象のサービスの名称（部分一致）を指定します。
        schema:
          type: string
          example: 港区
      - in: query
        name: prefecture_code
        description: 都道府県コードを指定します。
        schema:
          type: string
          example: '13'
      - in: query
        name: municipality_code
        description: 市区町村コードを指定します。
        schema:
          type: string
          example: '13103'
      - name: status
        in: query
        style: form
        explode: false
        schema:
          type: array
          items:
            type: string
            enum:
            - upcoming
            - active
            - ended
            description: '利用期間に基づく汎用的なステータスを表します。

              - `upcoming`: 利用開始日時を迎える前の状態

              - `active`: 現在利用可能な状態

              - `ended`: 利用終了日時を経過した状態

              '
          default:
          - upcoming
          - active
        description: "フィルター対象とするサービスのステータスを複数指定します。  \n- **`upcoming`**  \n  利用開始日時を迎える前のサービス\n- **`active`**  \n  現在利用できるサービス\n- **`ended`**  \n  利用終了日時を経過したサービス<br/>- m\\_service.start\\_datetime, m\\_service.end\\_datetime"
        example:
        - upcoming
        - active
      - name: offset
        in: query
        description: 取得する結果の開始位置を指定します。<br/>- N/A (Pagination Logic)
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
        example: 30
      - name: limit
        in: query
        description: 取得する結果の最大件数を指定します。<br/>- N/A (Pagination Logic)
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        example: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - type: object
                  required:
                  - services
                  - total
                  - offset
                  - limit
                  properties:
                    services:
                      description: サービス情報のリストです。
                      type: array
                      minItems: 0
                      items:
                        allOf:
                        - type: object
                          required:
                          - id
                          - name
                          - access_scope
                          - operation_type
                          - allow_ridepooling
                          - start_datetime
                          - cities
                          - service_terms
                          - available_passenger_types
                          - supported_accessibility_features
                          - operating_hours
                          - special_operating_hours
                          - announcements
