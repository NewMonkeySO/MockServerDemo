  /stops:
    get:
      tags:
      - stops
      summary: (M16-IF-110)乗降場所一覧を取得
      operationId: getStops
      description: "オンデマンドバスの固定の乗降場所情報を取得します。  \nこの検索APIでは、クエリパラメータの指定に応じて複数の条件で乗降場所を絞り込むことができます。  \n各条件は組み合わせて使用可能で、AND 条件として評価されます。  \n\n主な検索条件とその動作は以下のとおりです：\n- `stop_ids`  \n  明示的な乗降場所IDの指定（完全一致）です。  \n  他の条件よりも優先され、指定されたIDに一致する停留所のみを返します。  \n- `service_ids`  \n  指定されたサービスIDのいずれかを利用可能な乗降場所を対象とします（OR 条件）。  \n- `name`  \n  乗車場所名称に対する部分一致検索です。  \n  ひらがなや英語表記の補助語句にはマッチしません（`search_words` に含まれても検索対象にはなりません）。  \n- `status`  \n  利用開始・終了日時に基づいたステータス（`upcoming`, `active`, `ended`）で絞り込みます。  \n  複数指定可能（OR 条件）です。  \n- `location` + `radius`  \n  指定された中心座標と半径に基づいて、該当エリア内にある停留所を対象とします。  \n  `location` が指定されており、`radius` が省略された場合はデフォルトで `500` メートルが適用されます。  \n  `radius` のみの指定は無効です（`location` とセットで使用してください）。  \n\nリクエスト例:\n```\nGET /stops?service_ids=1,2,3&status=upcoming,active,ended&offset=0&limit=20\n```\n"
      parameters:
      - in: query
        name: stop_ids
        description: 取得対象の乗降場所IDをカンマ区切りで指定します。<br/>- m\_stop.stop\_id
        schema:
          type: array
          items:
            type: string
          example:
          - '1'
          - '2'
          - '3'
        style: form
        explode: false
      - name: service_ids
        in: query
        schema:
          type: array
          items:
            type: string
          example:
          - '1'
          - '2'
          - '3'
          description: "取得対象のサービスIDをカンマ区切りで指定します。  \n指定されたいずれかのサービスIDに該当する対象を取得します（OR条件）。\n"
        style: form
        explode: false
        description: '- m\_service\_stop.service\_id'
      - in: query
        name: name
        description: 取得対象の乗降場所の名称（部分一致）を指定します。<br/>- m\_stop.name
        schema:
          type: string
          example: 新橋
      - name: status
        in: query
        style: form
        explode: false
        schema:
          type: array
          items:
            type: string
            enum:
            - upcoming
            - active
            - ended
            description: '利用期間に基づく汎用的なステータスを表します。

              - `upcoming`: 利用開始日時を迎える前の状態

              - `active`: 現在利用可能な状態

              - `ended`: 利用終了日時を経過した状態

              '
          default:
          - upcoming
          - active
        description: "フィルター対象とする乗降場所のステータスを複数指定します。  \n- **`upcoming`**  \n  利用開始日時を迎える前の乗降場所\n- **`active`**  \n  現在利用できる乗降場所\n- **`ended`**  \n  利用終了日時を経過した乗降場所<br/>- m\\_stop.start\\_datetime, m\\_stop.end\\_datetime"
        example:
        - upcoming
        - active
      - name: location
        in: query
        description: "検索の中心座標を `longitude,latitude` のカンマ区切り形式で指定します。  \n例：`139.767125,35.681236`（経度・緯度の順に注意）  \n`radius` と併せて指定することで、中心からの距離に基づく範囲検索が可能になります。<br/>- m\\_stop.location"
        required: false
        schema:
          type: string
          pattern: ^[-+]?[0-9]*\.?[0-9]+,[-+]?[0-9]*\.?[0-9]+$
          example: 139.767125,35.681236
      - name: radius
        in: query
        description: "`location` パラメータと併せて使用することで、中心座標からの検索半径（メートル単位）を指定できます。  \n`location` が指定されており、この値が省略された場合は、デフォルトで `500` メートルが適用されます。  \nこの値だけを指定した場合は無効です。<br/>- N/A (Geo Query Logic)"
        required: false
        schema:
          type: integer
          minimum: 1
          default: 500
          example: 500
      - name: offset
        in: query
        description: 取得する結果の開始位置を指定します。<br/>- N/A (Pagination Logic)
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
        example: 30
      - name: limit
        in: query
        description: 取得する結果の最大件数を指定します。<br/>- N/A (Pagination Logic)
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        example: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - type: object
                  required:
                  - stops
                  - total
                  - offset
                  - limit
                  properties:
                    stops:
                      description: 乗降場所情報のリストです。
                      type: array
                      minItems: 0
                      items:
                        type: object
                        required:
                        - id
                        - service_ids
                        - location
                        - name
                        - start_datetime
                        - is_boarding_available
                        - is_alighting_available
                        - suspensions
                        - pictures
                        properties:
                          id:
                            type: string
                            description: 固定の乗降場所の一意なIDです。<br/>- m\_stop.stop\_id
                          service_ids:
                            type: array
                            description: この乗降場所を利用可能なサービスのサービスID一覧です。<br/>- m\_service\_stop.service\_id
                            items:
                              type: string
                          location:
                            description: 乗降場所を示す、経度・緯度（WGS-84）による地理座標です。<br/>- m\_stop.location
                            type: object
                            required:
                            - type
                            - coordinates
                            properties:
                              type:
                                type: string
                                enum:
                                - Point
                                description: GeoJSONにおけるジオメトリタイプ（常に `Point`）
                              coordinates:
                                type: array
                                description: "経度・緯度を含む配列です。  \n`[longitude, latitude]` の順で格納されます（GeoJSON仕様準拠）。\n"
                                minItems: 2
                                maxItems: 2
                                items:
                                  type: number
                                  format: double
                          name:
                            type: string
                            description: 乗降場所の名称です。<br/>- m\_stop.name
                          description:
                            type: string
                            description: 乗降場所の説明文です。<br/>- m\_stop.description
                          search_words:
                            type: array
                            description: "検索用の補助語句のリストです。  \nこのフィールドは **停留所名称の検索候補を拡張するために、クライアント側で使用する**ことを想定しています。  \nふりがな・略称・英語表記・旧名称などが含まれることがあります。  \n例えば、インクリメンタル検索や予測変換時の候補マッチに活用できます。<br/>- m\\_stop\\_search\\_word.search\\_word"
                            items:
                              type: string
                          start_datetime:
                            type: string
                            format: date-time
                            description: 乗降場所の利用開始日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。<br/>- m\_stop.start\_datetime
                          end_datetime:
                            type: string
                            format: date-time
                            description: 乗降場所の利用終了日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T20:59:59+09:00）です。この項目が指定されていない場合、乗降場所は「無期限（終了日未定）」として扱われます。<br/>- m\_stop.end\_datetime
                          is_boarding_available:
                            type: boolean
                            description: 乗車可能かどうかを示します。<br/>- m\_stop.is\_boarding\_available
                          is_alighting_available:
                            type: boolean
                            description: 降車可能かどうかを示します。<br/>- m\_stop.is\_alighting\_available
                          suspensions:
                            type: array
                            description: 一時的な利用停止情報のリストです。<br/>- m\_stop\_suspension
                            minItems: 0
                            items:
                              type: object
                              required:
                              - start_datetime
                              - end_datetime
                              properties:
                                start_datetime:
                                  type: string
                                  format: date-time
                                  description: 一時停止開始日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。
                                end_datetime:
                                  type: string
                                  format: date-time
                                  description: 一時停止終了日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T20:59:59+09:00）です。
                                description:
                                  type: string
                                  description: 停止理由や補足説明です。
                          pictures:
                            type: array
                            description: 乗降場所の画像のリストです。
                            minItems: 0
                            items:
                              type: object
                              required:
                              - url
                              properties:
                                title:
                                  type: string
                                  description: 画像のタイトルです。
                                url:
                                  type: string
                                  format: uri
                                  description: 画像のURLです。<br/>- m\_stop\_picture.url
                                description:
                                  type: string
                                  description: 画像の説明文です。
                          created_at:
                            type: string
                            description: 作成日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。<br/>- N/A (System Audit Column)
                            format: date-time
                          updated_at:
