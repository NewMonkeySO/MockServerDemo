                                description: "経度・緯度を含む配列です。  \n`[longitude, latitude]` の順で格納されます（GeoJSON仕様準拠）。\n"
                                minItems: 2
                                maxItems: 2
                                items:
                                  type: number
                                  format: double
                          timestamp:
                            type: string
                            format: date-time
                            description: 車両位置情報の取得日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。
                - type: object
                  properties:
                    total:
                      type: integer
                      description: 取得可能な総件数を示します。
                    offset:
                      type: integer
                      description: 取得する結果の開始位置を示します。デフォルトは0です。
                    limit:
                      type: integer
                      description: 取得する結果の最大件数を示します。デフォルトは20件です。
              examples:
