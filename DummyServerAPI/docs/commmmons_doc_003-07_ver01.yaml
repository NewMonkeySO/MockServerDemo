      operationId: putReservationsIdPayment
      description: '指定された予約に対して、決済金額および決済ステータスを登録または更新します。


        ### 前提

        - 各予約には決済情報が1件のみ紐づきます（分割払いや複数登録は非対応）。

        - 決済情報は予約のサブリソースであり、独立したIDは持ちません。

        - 本APIは `PUT /reservations/{reservation_id}/payment` により、新規登録と更新の両方に対応します。

        - RFCに従い、リソースが存在しない場合の新規作成もPUTで許容しています。

        - POSTとの併用は用途が重複するため、本APIではPUTのみに集約しています。

        '
      parameters:
      - name: id
        in: path
        required: true
        description: 予約IDを指定します。<br/>- t\_reservation.reservation\_id
        schema:
          type: string
          example: '1'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - amount
              - payment_status
