  /passengers/{id}/agreements:
    post:
      tags:
      - passengers
      summary: (M16-IF-090)ユーザーの規約同意を登録
      operationId: postPassengersIdAgreements
      description: "指定されたユーザーIDに対して、利用規約（terms_id）への新規同意を登録します。  \n\n利用規約は内容が更新されるたびに新しい `terms_id` を発行する前提です。  \nユーザーは異なる `terms_id` ごとに同意を行う必要があります。  \n複数の規約について同時に同意を登録することが可能です。  \nすでに同意が登録されている `terms_id` が含まれている場合も、エラーにはせず 200 OK を返します。  \n各項目の処理結果は `status` フィールド（`created` / `already_agreed`）で判別します。\n"
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: ユーザーIDを指定します。<br/>- m\_passenger.passenger\_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - agreements
              properties:
                agreements:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                    - terms_id
                    - agreed_at
                    properties:
                      terms_id:
                        type: string
                        description: 規約を識別する一意なIDです。<br/>- m\_agreement.terms\_id
                      agreed_at:
                        type: string
                        format: date-time
                        description: ユーザーが規約に同意した日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。<br/>- m\_agreement.agreed\_at
            examples:
              TestCase001:
                value:
                  agreements:
                  - terms_id: pt012345678
                    agreed_at: '2025-06-25T12:23:35+09:00'
                  - terms_id: st012345678
                    agreed_at: '2025-06-25T12:23:35+09:00'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                - agreements
                properties:
                  agreements:
                    type: array
                    minItems: 1
                    items:
                      allOf:
                      - type: object
                        required:
                        - terms_id
                        - term_category
                        - agreed_at
                        properties:
                          terms_id:
                            type: string
                            description: 規約を識別する一意なIDです。
                          term_category:
                            type: string
                            description: '規約の種類です。

                              `GET /terms` および `GET /services/{id}` で取得できる規約の category を参照してください。

                              '
                          service_id:
                            type: string
                            description: サービスIDを指定します。（サービスに関する規約の場合のみ設定されます）
                          agreed_at:
                            type: string
                            format: date-time
                            description: ユーザーが規約に同意した日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。
                      - type: object
                        required:
                        - status
                        properties:
                          status:
                            type: string
                            enum:
                            - created
                            - already_agreed
                            description: "同意の状態を示します。\n- **`created`**  \n  新規に同意が登録されたことを示します。\n- **`already_agreed`**  \n  すでに同意済みの規約が指定されたことを示します。<br/>- N/A (Process Result)"
              examples:
                TestCase001:
                  value:
                    agreements:
                    - terms_id: pt012345678
                      term_category: platform
                      agreed_at: '2025-06-11T10:43:12+09:00'
                      status: already_agreed
                    - terms_id: st012345678
