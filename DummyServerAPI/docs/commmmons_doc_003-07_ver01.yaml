                      type: array
                      minItems: 0
                      items:
                        type: object
                        required:
                        - vehicle_id
                        - service_id
                        - location
                        - timestamp
                        properties:
                          vehicle_id:
                            type: string
                            description: 車両の一意な識別子です。
                          service_id:
                            type: string
                            description: 車両が属するサービスのIDです。
                          location:
                            description: 車両位置を示す、経度・緯度（WGS-84）による地理座標です。
                            type: object
                            required:
