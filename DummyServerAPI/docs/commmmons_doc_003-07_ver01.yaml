openapi: 3.0.4
info:
  title: デマンドバスシステム連携API標準仕様書
  description: "本ドキュメントは、オンデマンドバスサービスにおける共通API仕様の標準化を目的として策定された OpenAPI 定義です。  \n各 API は、MaaS 事業者・自治体・オンデマンドバス事業者間の相互接続性向上を意図して設計されています。  \nHTTP ステータスコードが `200 OK` 以外の場合のレスポンス構造は RFC 9457 に準拠しています。\n本仕様書に記載されている HTTP ステータスコードは、各 API において一般的に想定されるステータスコードの推奨例です。  \n実装にあたっては、これらを基準としつつ、サービスの要件や運用状況に応じて必要に応じたステータスコードを柔軟に追加してください。\n"
  contact:
    url: https://www.mlit.go.jp/commmmons/
  version: 1.0.0
servers:
- url: http://standards.swagger.io/v1
tags:
- name: platform terms
  description: プラットフォーム利用規約
- name: services
  description: サービス情報
- name: passengers
  description: ユーザー情報
- name: stops
  description: 乗降場所情報
- name: reservations
  description: 予約情報
- name: vehicles
  description: 車両情報
- name: operation
  description: 運行情報
paths:
  /terms:
    get:
      tags:
      - platform terms
      summary: (M16-IF-010)プラットフォーム規約一覧を取得
      operationId: getTerms
      description: "プラットフォーム全体に適用される各種規約の最新一覧を取得します。  \n各規約は、サービス利用時のルールや条件を定めたもので、カテゴリごとに1件の最新情報を提供します。  \n内容が更新されるたびに新しい規約IDが発行され、ユーザーはそのURLから詳細を確認し、必要に応じて同意します。  \n各ユーザーの同意状況は、 `/passengers/{id}/agreements` エンドポイントから取得できます。  \nこのAPIで取得した最新規約と照らし合わせ、再同意が必要かどうか判断してください。\n"
      parameters:
      - in: query
        name: category
        description: 取得する利用規約のカテゴリを指定します。指定しない場合は全てのカテゴリの利用規約を取得します。<br/>- m\_term.category
        required: false
        schema:
          type: string
          enum:
          - platform
          - privacy
          - cancellation
          - user
          - provider
          - third_party
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  terms:
                    type: array
                    description: プラットフォーム利用に関する規約のリストです。
                    items:
                      type: object
                      required:
                      - id
                      - category
                      - url
                      - agreement_required
                      properties:
                        id:
                          type: string
                          description: 規約の一意な識別子です。<br/>- m\_term.terms\_id
                        category:
                          type: string
                          enum:
                          - platform
                          - privacy
                          - cancellation
                          - user
                          - provider
                          - third_party
                          description: "規約の分類カテゴリです。\n- **`platform`**  \nプラットフォーム全体に適用される規約。\n- **`privacy`**  \nプライバシーポリシーに関する規約。\n- **`cancellation`**  \nキャンセルポリシーに関する規約。\n- **`user`**  \nユーザー向けの規約。\n- **`provider`**  \nサービスプロバイダー向けの規約。\n- **`third_party`**  \nサードパーティとの関係に関する規約。<br/>- m\\_term.category"
                        name:
                          type: string
                          description: 規約の名称です。<br/>- m\_term.name
                        url:
                          type: string
                          description: 規約のURLです。<br/>- m\_term.url
                        agreement_required:
                          type: boolean
                          description: 規約に対してユーザーから同意を得ることが必須かどうかを示します。<br/>- m\_term.agreement\_required
                        created_at:
                          type: string
                          description: 作成日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。<br/>- N/A (System Audit Column)
                          format: date-time
                        updated_at:
                          type: string
                          description: 最終更新日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。<br/>- N/A (System Audit Column)
                          format: date-time
              examples:
                TestCase001:
                  value:
                    terms:
                    - id: pt012345678
                      category: platform
                      name: プラットフォーム利用規約
                      url: https://example.com/terms
                      agreement_required: true
                      created_at: '2025-06-01T10:00:00+09:00'
                      updated_at: '2025-06-01T10:00:00+09:00'
                    - id: pt012345679
                      category: privacy
                      name: プライバシーポリシー
                      url: https://example.com/privacy
                      agreement_required: true
                      created_at: '2025-06-02T09:00:00+09:00'
                      updated_at: '2025-06-02T09:00:00+09:00'
                    - id: pt012345680
                      category: cancellation
                      name: キャンセルポリシー
                      url: https://example.com/cancel
                      agreement_required: true
                      created_at: '2025-06-03T08:00:00+09:00'
                      updated_at: '2025-06-19T12:00:00+09:00'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                type: object
                required:
                - type
                - title
                properties:
                  type:
                    type: string
                    description: エラーの種類を識別するURIです。
                  title:
                    type: string
                    description: 人間が読めるエラーの簡素な概要です。
                  status:
                    type: integer
                    description: HTTPステータスコードです。
                  detail:
                    type: string
                    description: 人間が読めるエラーの詳細な説明です。
                  instance:
                    type: string
                    description: このエラーが発生した特定のリクエストやリソースを識別するURIです。
              examples:
                TestCase400:
                  value:
                    type: string
                    title: string
                    status: 400
                    detail: string
                    instance: string
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                required:
                - type
                - title
                properties:
                  type:
                    type: string
                    description: エラーの種類を識別するURIです。
                  title:
                    type: string
                    description: 人間が読めるエラーの簡素な概要です。
                  status:
                    type: integer
                    description: HTTPステータスコードです。
                  detail:
                    type: string
                    description: 人間が読めるエラーの詳細な説明です。
                  instance:
                    type: string
                    description: このエラーが発生した特定のリクエストやリソースを識別するURIです。
              examples:
                TestCase401:
                  value:
                    type: string
                    title: string
                    status: 401
                    detail: string
                    instance: string
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                type: object
                required:
                - type
                - title
                properties:
                  type:
                    type: string
                    description: エラーの種類を識別するURIです。
                  title:
                    type: string
                    description: 人間が読めるエラーの簡素な概要です。
                  status:
                    type: integer
                    description: HTTPステータスコードです。
                  detail:
                    type: string
                    description: 人間が読めるエラーの詳細な説明です。
                  instance:
                    type: string
                    description: このエラーが発生した特定のリクエストやリソースを識別するURIです。
              examples:
                TestCase403:
                  value:
                    type: string
                    title: string
                    status: 403
                    detail: string
                    instance: string
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                type: object
                required:
                - type
                - title
                properties:
                  type:
                    type: string
                    description: エラーの種類を識別するURIです。
                  title:
                    type: string
                    description: 人間が読めるエラーの簡素な概要です。
                  status:
                    type: integer
                    description: HTTPステータスコードです。
                  detail:
                    type: string
                    description: 人間が読めるエラーの詳細な説明です。
                  instance:
                    type: string
                    description: このエラーが発生した特定のリクエストやリソースを識別するURIです。
              examples:
                TestCase500:
                  value:
                    type: string
                    title: string
                    status: 500
                    detail: string
                    instance: string
  /services:
    get:
      tags:
      - services
      summary: (M16-IF-020)サービスの概要情報一覧を取得
      operationId: getServices
      description: "オンデマンドバスサービスの概要情報を取得します。  \nこの検索APIでは、クエリパラメータの指定に応じて複数の条件でサービスを絞り込むことができます。  \n各条件は組み合わせて使用可能で、AND 条件として評価されます。  \n\n主な検索条件とその動作は以下のとおりです：\n- `service_ids`  \n  明示的なサービスIDの指定（完全一致）です。  \n  他の条件よりも優先され、指定されたIDに一致するサービスのみを返します。  \n- `name`  \n  サービス名称に対する部分一致検索です。  \n- `prefecture_code`  \n  都道府県コードによる絞り込みが可能です。  \n- `municipality_code`  \n  市区町村コードによる絞り込みが可能です。  \n- `status`  \n  利用開始・終了日時に基づいたステータス（`upcoming`, `active`, `ended`）で絞り込みます。  \n  複数指定可能（OR 条件）です。  \n  省略時は `upcoming`, `active` の両方が指定された状態と同様に扱われます。  \n\n※ 注意：この一覧APIのレスポンスには、以下の詳細情報は含まれません。  \n- `operation_settings`（運行設定）\n- `reservable_areas`（予約可能なエリア）\n- `area_transitions`（エリア間移動ルール）\n\n上記の項目はデータ量が大きく、一覧取得時には不要なケースが多いため、個別取得API（`GET /services/{id}`）でのみ提供されます。\n\nリクエスト例:\n```\nGET /services?service_ids=1,2,3&name=港区&prefecture_code=13&municipality_code=13103&offset=30&limit=10\n```\n"
      parameters:
      - name: service_ids
        in: query
        schema:
          type: array
          items:
            type: string
          example:
          - '1'
          - '2'
          - '3'
          description: "取得対象のサービスIDをカンマ区切りで指定します。  \n指定されたいずれかのサービスIDに該当する対象を取得します（OR条件）。\n"
        style: form
        explode: false
        description: '- m\_service.service\_id'
      - in: query
        name: name
        description: 取得対象のサービスの名称（部分一致）を指定します。<br/>- m\_service.name
        schema:
          type: string
          example: 港区
      - in: query
        name: prefecture_code
        description: 都道府県コードを指定します。<br/>- m\_service\_location.prefecture\_code
        schema:
          type: string
          example: '13'
      - in: query
        name: municipality_code
        description: 市区町村コードを指定します。<br/>- m\_service\_location.municipality\_code
        schema:
          type: string
          example: '13103'
      - name: status
        in: query
        style: form
        explode: false
        schema:
          type: array
          items:
            type: string
            enum:
            - upcoming
            - active
            - ended
            description: '利用期間に基づく汎用的なステータスを表します。

              - `upcoming`: 利用開始日時を迎える前の状態

              - `active`: 現在利用可能な状態

              - `ended`: 利用終了日時を経過した状態

              '
          default:
          - upcoming
          - active
        description: "フィルター対象とするサービスのステータスを複数指定します。  \n- **`upcoming`**  \n  利用開始日時を迎える前のサービス\n- **`active`**  \n  現在利用できるサービス\n- **`ended`**  \n  利用終了日時を経過したサービス<br/>- m\\_service.start\\_datetime, m\\_service.end\\_datetime"
        example:
        - upcoming
        - active
      - name: offset
        in: query
        description: 取得する結果の開始位置を指定します。<br/>- N/A (Pagination Logic)
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
        example: 30
      - name: limit
        in: query
        description: 取得する結果の最大件数を指定します。<br/>- N/A (Pagination Logic)
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        example: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                - type: object
                  required:
                  - services
                  - total
                  - offset
                  - limit
                  properties:
                    services:
                      description: サービス情報のリストです。
                      type: array
                      minItems: 0
                      items:
                        allOf:
                        - type: object
                          required:
                          - id
                          - name
                          - access_scope
                          - operation_type
                          - allow_ridepooling
                          - start_datetime
                          - cities
                          - service_terms
                          - available_passenger_types
                          - supported_accessibility_features
                          - operating_hours
                          - special_operating_hours
                          - announcements
                          properties:
                            id:
                              type: string
                              description: サービスの一意な識別子です。<br/>- m\_service.service\_id
                            name:
                              type: string
                              description: サービスの名称です。<br/>- m\_service.name
                            description:
                              type: string
                              description: サービスの説明です。<br/>- m\_service.description
                            brand_image_url:
                              type: string
                              description: サービスのブランドイメージ画像のURLです。<br/>- m\_service.brand\_image\_url
                            access_scope:
                              type: string
                              enum:
                              - public
                              - resident_only
                              - registered_user_only
                              - private
                              - other
                              description: "サービスの公開範囲を示します。\n- **`public`**  \n限定なし、一般公開されていて誰でも利用できるサービス。\n- **`resident_only`**  \nサービス提供エリアに在住の地域住民のみが利用可能なサービス。\n- **`registered_user_only`**  \n事前登録をしたユーザーのみが利用可能なサービス。\n- **`private`**  \n一般公開されていない、特定の内部ユーザーのみが利用可能なサービス。\n- **`other`**  \nその他。<br/>- m\\_service.access\\_scope"
                            operation_type:
                              type: string
                              enum:
                              - on_demand
                              - slot_area_batch_confirmed
                              - fixed_time_fixed_route
                              description: "サービスの運行方式の種類を示します。\n- **`on_demand`**  \n利用者の予約に応じて即時配車されるオンデマンド方式。\n- **`slot_area_batch_confirmed`**  \n時間帯ごとに運行エリアを切り替える方式で、各時間帯の締切時刻を設け、締切後に暫定予約をまとめて確定し、効率的なルートを生成して運行します。\n- **`fixed_time_fixed_route`**  \n決まったルートと時刻で運行される固定路線方式。<br/>- m\\_service.operation\\_type"
                            allow_ridepooling:
                              type: boolean
                              description: 相乗りが発生し得るか否かを示します。<br/>- m\_service.allow\_ridepooling
                            start_datetime:
                              type: string
                              description: サービスの開始日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。<br/>- m\_service.start\_datetime
                              format: date-time
                            end_datetime:
                              type: string
                              description: サービスの終了日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T20:59:59+09:00）です。この項目が指定されていない場合、サービスは「無期限（終了日未定）」として扱われます。<br/>- m\_service.end\_datetime
                              format: date-time
                            service_group_id:
                              type: string
                              description: "サービスの上位グループの一意な識別子です。  \n指定がない場合は、サービスが単独で存在することを示します。<br/>- m\\_service.service\\_group\\_id"
                            cities:
                              type: array
                              description: サービスが提供される都道府県・市区町村のリストです。
                              minItems: 0
                              items:
                                type: object
                                required:
                                - prefecture_code
                                - prefecture_name
                                - municipalities
                                properties:
                                  prefecture_code:
                                    type: string
                                    description: 都道府県コードです。<br/>- m\_service\_location.prefecture\_code
                                  prefecture_name:
                                    type: string
                                    description: 都道府県名です。<br/>- m\_prefecture.prefecture\_name
                                  municipalities:
                                    type: array
                                    description: 市区町村のリストです。
                                    minItems: 0
                                    items:
                                      type: object
                                      required:
                                      - code
                                      - name
                                      properties:
                                        code:
                                          type: string
                                          description: 市区町村コードです。<br/>- m\_service\_location.municipality\_code
                                        name:
                                          type: string
                                          description: 市区町村名です。<br/>- m\_municipality.municipality\_name
                            service_terms:
                              type: array
                              description: サービス利用に関する規約のリストです。
                              minItems: 0
                              items:
                                type: object
                                required:
                                - id
                                - category
                                - url
                                - agreement_required
                                properties:
                                  id:
                                    type: string
                                    description: 規約の一意な識別子です。<br/>- m\_service\_term.terms\_id
                                  category:
                                    type: string
                                    enum:
                                    - service
                                    - privacy
                                    - cancellation
                                    - user
                                    - third_party
                                    description: "規約の分類カテゴリです。\n- **`service`**  \nサービス利用に関する規約。\n- **`privacy`**  \nプライバシーポリシーに関する規約。\n- **`cancellation`**  \nキャンセルポリシーに関する規約。\n- **`user`**  \nユーザー向けの規約。\n- **`third_party`**  \nサードパーティとの関係に関する規約。\n"
                                  name:
                                    type: string
                                    description: 規約の名称です。
                                  url:
                                    type: string
                                    description: 規約のURLです。
                                  agreement_required:
                                    type: boolean
                                    description: 規約に対してユーザーから同意を得ることが必須かどうかを示します。
                                  created_at:
                                    type: string
                                    description: 作成日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。
                                    format: date-time
                                  updated_at:
                                    type: string
                                    description: 最終更新日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。
                                    format: date-time
                            available_passenger_types:
                              type: array
                              description: "サービスがサポートする乗客のタイプの情報です。  \n乗客のタイプは、例えば一般/未就学児/シニアなど、運賃が異なる乗客を示します。  \n`order` は昇順で表示して、未設定の場合は後方に配置します。\n"
                              minItems: 1
                              items:
                                type: object
                                required:
                                - passenger_type_id
                                - name
                                properties:
                                  passenger_type_id:
                                    type: string
                                    description: 乗客タイプの一意な識別子です。<br/>- m\_available\_passenger\_type.passenger\_type\_id
                                  name:
                                    type: string
                                    description: 乗客タイプの名称です。
                                  order:
                                    type: integer
                                    description: 表示順を示す番号です。
                                  description:
                                    type: string
                                    description: 乗客タイプの説明です。
                            supported_accessibility_features:
                              type: array
                              minItems: 0
                              items:
                                type: string
                                enum:
                                - wheelchair
                                - folding_wheelchair
                                - powered_wheelchair
                                - oversized_wheelchair
                                - scooter
                                - oversized_scooter
                                - walker
                                - oversized_walker
                                - only_car_walker
                                - only_car_rider
                                - extra_space_ambulant
                                - actual_door_to_door
                                - lift
                                - oversized_item
                                - stroller
                                - child_seat_baby
                                - child_seat_young
                                - bike
                                - white_cane
                                - service_animal
                                - oxygen_tank
                                - stretcher
                                description: '- m\_vehicle\_accessibility\_feature.accessibility\_feature\_type'
