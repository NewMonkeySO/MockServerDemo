  /reservations/candidates:
    post:
      tags:
      - reservations
      summary: (M16-IF-120)予約候補を生成
      operationId: postReservationsCandidates
      description: "ユーザーが指定した条件（乗車場所・降車場所・希望時間・人数など）をもとに、  \n対象サービスの中から予約可能な便候補をリアルタイムに生成します。  \n\nこのAPIを使うことで、アプリ側はユーザーに提示できる具体的な便候補（乗車・降車時刻、運賃）を取得できます。  \n候補が見つからなかった場合は `candidates` に空配列が返され、`no_candidate_reason` に理由が含まれます。  \n\n候補情報は予約確定前の確認用途として設計されており、取得した候補をもとに `/reservations` への予約リクエストが可能です。  \n`reservation_request` フィールドには、この候補を予約確定する際に `/reservations` にそのまま送信できる予約リクエストのデータが含まれます。  \n`display` フィールドには、ユーザーに提示するための補足情報（乗降ポイント名、車両名、ナンバープレート、車両画像など）が含まれます。\n"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: '指定された条件に基づいて、予約便候補を動的に生成するためのリクエストです。

                '
              required:
              - service_ids
              - preferred_time
              - pickup
              - dropoff
              - passenger_count
              - accessibility_feature_count
              properties:
                service_ids:
                  type: array
                  items:
                    type: string
                  description: "サービスIDのリストです。  \n複数のサービスで利用できる乗車場所、降車場所を用いる場合、それぞれのサービスに対して予約便候補検索を行うことが可能です。<br/>- m\\_service.service\\_id"
                preferred_time:
                  type: object
                  description: 希望する乗車または降車の日時を指定します。<br/>- N/A (Calculation Logic)
                  required:
                  - type
                  - datetime
                  properties:
                    type:
                      type: string
                      enum:
                      - pickup
                      - dropoff
                      description: "乗車時刻指定か降車時刻指定かを示します。\n- **`pickup`**  \n  乗車時刻を指定する場合に選択します。\n- **`dropoff`**  \n  降車時刻を指定する場合に選択します。\n"
                    datetime:
                      type: string
                      format: date-time
                      description: 希望する乗車または降車の日時です。形式はRFC3339のdate-time形式文字列（例：2025-06-19T07:00:00+09:00）です。
                pickup:
                  type: object
                  description: "固定の乗降場所・任意の地点・または自宅のいずれかを指定するための情報です。  \n`stop_id`、`location`、または `passenger_id` のいずれか一つを指定します。\n\nこの構造は、予約リクエスト時の入力だけでなく、予約候補や予約情報のレスポンスにも使用されます。  \nリクエストにおいては、対象サービスがサポートする以下の `reservable_location_types` に応じて、指定できる項目が異なります：\n\n- **`fixed_stop`** を含むサービスでは、`stop_id` を指定できます。\n- **`custom_location`** を含むサービスでは、`location` を指定できます。\n- **`home`** を含むサービスでは、`passenger_id` を指定することで自宅情報が使用されます。\n"
                  oneOf:
                  - type: object
                    required:
                    - type
                    - stop_id
                    properties:
                      type:
                        type: string
                        enum:
                        - fixed_stop
                        description: 乗降場所の種類を示します。`fixed_stop` の場合、固定の乗降場所を示します。
                      stop_id:
                        type: string
                        description: 固定の乗降場所のIDです。<br/>- m\_stop.stop\_id (type=fixed\_stop時)
                  - type: object
                    required:
                    - type
                    - location
                    properties:
                      type:
                        type: string
                        enum:
                        - custom_location
                        description: 乗降場所の種類を示します。`custom_location` の場合、任意の地点を示します。
                      location:
                        description: 任意の地点を示す、経度・緯度（WGS-84）による地理座標です。<br/>- N/A (Arbitrary Input)
                        type: object
                        required:
                        - type
                        - coordinates
                        properties:
                          type:
                            type: string
                            enum:
                            - Point
                            description: GeoJSONにおけるジオメトリタイプ（常に `Point`）
                          coordinates:
                            type: array
                            description: "経度・緯度を含む配列です。  \n`[longitude, latitude]` の順で格納されます（GeoJSON仕様準拠）。\n"
                            minItems: 2
                            maxItems: 2
                            items:
                              type: number
                              format: double
                  - type: object
                    required:
                    - type
                    - passenger_id
                    properties:
                      type:
                        type: string
                        enum:
                        - home
                        description: 乗降場所の種類を示します。`home` の場合、自宅を示します。
                      passenger_id:
                        type: string
                        description: ユーザーの自宅位置を指定する場合のユーザーIDです。<br/>- m\_passenger.passenger\_id (type=home時)
                dropoff:
                  type: object
                  description: "固定の乗降場所・任意の地点・または自宅のいずれかを指定するための情報です。  \n`stop_id`、`location`、または `passenger_id` のいずれか一つを指定します。\n\nこの構造は、予約リクエスト時の入力だけでなく、予約候補や予約情報のレスポンスにも使用されます。  \nリクエストにおいては、対象サービスがサポートする以下の `reservable_location_types` に応じて、指定できる項目が異なります：\n\n- **`fixed_stop`** を含むサービスでは、`stop_id` を指定できます。\n- **`custom_location`** を含むサービスでは、`location` を指定できます。\n- **`home`** を含むサービスでは、`passenger_id` を指定することで自宅情報が使用されます。\n"
                  oneOf:
                  - type: object
                    required:
                    - type
                    - stop_id
                    properties:
                      type:
                        type: string
                        enum:
                        - fixed_stop
                        description: 乗降場所の種類を示します。`fixed_stop` の場合、固定の乗降場所を示します。
                      stop_id:
                        type: string
                        description: 固定の乗降場所のIDです。<br/>- m\_stop.stop\_id (type=fixed\_stop時)
                  - type: object
                    required:
                    - type
                    - location
                    properties:
                      type:
                        type: string
                        enum:
                        - custom_location
                        description: 乗降場所の種類を示します。`custom_location` の場合、任意の地点を示します。
                      location:
                        description: 任意の地点を示す、経度・緯度（WGS-84）による地理座標です。<br/>- N/A (Arbitrary Input)
                        type: object
                        required:
                        - type
                        - coordinates
                        properties:
                          type:
                            type: string
                            enum:
                            - Point
                            description: GeoJSONにおけるジオメトリタイプ（常に `Point`）
                          coordinates:
                            type: array
                            description: "経度・緯度を含む配列です。  \n`[longitude, latitude]` の順で格納されます（GeoJSON仕様準拠）。\n"
                            minItems: 2
                            maxItems: 2
                            items:
                              type: number
                              format: double
                  - type: object
                    required:
                    - type
                    - passenger_id
                    properties:
                      type:
                        type: string
                        enum:
                        - home
                        description: 乗降場所の種類を示します。`home` の場合、自宅を示します。
                      passenger_id:
                        type: string
                        description: ユーザーの自宅位置を指定する場合のユーザーIDです。
                passenger_count:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                    - passenger_type_id
                    - count
                    properties:
                      passenger_type_id:
                        type: string
                        description: 乗客の種別です。<br/>- m\_available\_passenger\_type.passenger\_type\_id
                      count:
                        type: integer
                        format: int32
                        minimum: 1
                        description: この種別の乗客数です。
                  description: "乗客の種別ごとの人数を示すリストです。  \n乗客種別は、サービスの詳細情報（GET /v1/services/{id}）で取得できる`available_passenger_types`を参照してください。  \n合計人数が1人以上になるように指定してください。\n0人の種別は指定できません。\n"
                accessibility_feature_count:
                  type: array
                  minItems: 0
                  items:
                    type: object
                    required:
                    - accessibility_feature_type
                    - count
                    properties:
                      accessibility_feature_type:
                        type: string
                        description: 乗客補助機能の種類です。利用可能な種類はサービスの詳細情報（GET /v1/services/{id}）で取得できる`supported_accessibility_features`を参照してください。
                        example: wheelchair
                      count:
                        type: integer
                        description: この種類の乗客補助機能の必要数です。
                        format: int32
                        minimum: 1
                  description: "乗客全体のうち、補助機能を必要とする人数を種類ごとに指定します。  \n各人数は `passenger_count` に含まれているものとして扱います（内数）。  \n補助機能を利用する乗客が誰かは問わず、「何人分必要か」を表すための項目です。  \n不要な場合は空配列（[]）を指定してください。  \n種類はサービス詳細（GET /v1/services/{id}）の `supported_accessibility_features` を参照してください。\n"
                vehicle_id:
                  type: string
